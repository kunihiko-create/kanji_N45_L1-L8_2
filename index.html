<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字フラッシュカード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.25rem 1rem 2rem;
  }

  h1 {
    font-size: 18px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 1.25rem;
    letter-spacing: 0.02em;
  }

  /* ── Tab row ── */
  .tab-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 1rem;
    width: 100%;
    max-width: 480px;
  }
  .tab-row button {
    flex: 1;
    min-width: 90px;
    padding: 8px 6px;
    font-size: 12px;
    font-family: inherit;
    background: #fff;
    border: 0.5px solid #ccc;
    border-radius: 8px;
    cursor: pointer;
    color: #444;
    transition: background .15s, color .15s;
  }
  .tab-row button.active {
    background: #185FA5;
    color: #fff;
    border-color: #185FA5;
  }
  .tab-row button:hover:not(.active) { background: #f0f0f0; }

  /* ── Progress ── */
  .progress-wrap { width: 100%; max-width: 480px; margin-bottom: .3rem; text-align: center; }
  .progress-text { font-size: 13px; color: #666; }
  .progress-text strong { color: #1a1a1a; }
  .pbar { width: 100%; max-width: 480px; height: 3px; background: #ddd; border-radius: 2px; margin: .35rem 0 .4rem; }
  .pfill { height: 100%; background: #185FA5; border-radius: 2px; transition: width .3s ease; }
  .group-label { font-size: 11px; color: #999; text-align: center; min-height: 1.2rem; margin-bottom: .5rem; }

  /* ── Card ── */
  .card-area {
    perspective: 1200px;
    width: 100%;
    max-width: 480px;
    height: 360px;
    margin-bottom: .8rem;
  }
  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .5s ease;
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    border-radius: 14px;
    border: 0.5px solid #ddd;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.25rem 1.5rem;
  }
  .face.back {
    transform: rotateY(180deg);
    justify-content: flex-start;
    padding-top: 1.1rem;
    overflow-y: auto;
  }

  /* ── Front ── */
  .kanji { font-size: 72px; font-weight: 500; color: #1a1a1a; line-height: 1; }
  .front-hint { font-size: 14px; color: #aaa; margin-top: .75rem; }

  /* ── Back ── */
  .r-jp { font-size: 22px; font-weight: 500; color: #1a1a1a; text-align: center; }
  .r-rm { font-size: 14px; color: #888; margin-bottom: 2px; text-align: center; }
  .arti-label { font-size: 11px; color: #aaa; letter-spacing: .06em; text-align: center; }
  .r-mid { font-size: 15px; font-weight: 500; color: #185FA5; text-align: center; margin-bottom: 1px; }
  .r-men { font-size: 13px; color: #888; font-weight: 400; }
  .divider { width: 100%; height: .5px; background: #eee; margin: 7px 0; }
  .sub-divider { width: 100%; height: .5px; background: #eee; margin: 5px 0; opacity: .6; }
  .ex-tag { font-size: 11px; color: #aaa; letter-spacing: .05em; text-align: center; margin-bottom: 1px; }
  .ex-jp { font-size: 15px; color: #1a1a1a; text-align: center; margin-bottom: 1px; }
  .ex-rm { font-size: 13px; color: #888; text-align: center; font-style: italic; margin-bottom: 2px; }
  .ex-id { font-size: 14px; color: #888; text-align: center; }

  /* ── Hint & Nav ── */
  .flip-hint { text-align: center; font-size: 12px; color: #aaa; margin-bottom: .75rem; }
  .nav { display: flex; gap: 8px; width: 100%; max-width: 480px; }
  .nav button {
    flex: 1;
    padding: 10px 0;
    font-size: 13px;
    font-family: inherit;
    background: #fff;
    border: 0.5px solid #ccc;
    border-radius: 8px;
    cursor: pointer;
    color: #333;
    transition: background .12s;
  }
  .nav button:hover { background: #f0f0f0; }
  .nav button.sm { flex: .6; }

  /* ── Star feature ── */
  .star-badge {
    position: absolute; top: 12px; right: 14px;
    font-size: 22px; line-height: 1; color: #f5a623;
    opacity: 0; transition: opacity .2s;
    pointer-events: none;
    z-index: 1;
  }
  .star-badge.on { opacity: 1; }
  .star-btn {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 10px; padding: 7px 18px;
    font-size: 13px; font-family: inherit;
    background: #fff; border: 0.5px solid #ccc;
    border-radius: 8px; cursor: pointer; color: #555;
    transition: background .12s;
  }
  .star-btn.starred { background: #fff8e6; border-color: #f5a623; color: #c07800; }
  .star-btn:hover { background: #f9f9f9; }  /* ── Star list view ── */
  .star-view { display: none; width: 100%; max-width: 480px; }
  .star-view.on { display: block; }
  .star-list-empty { text-align: center; color: #aaa; font-size: 14px; padding: 2rem 0; }
  .star-item {
    display: flex; align-items: center; gap: 12px;
    background: #fff; border: 0.5px solid #ddd;
    border-radius: 10px; padding: 10px 14px; margin-bottom: 8px;
  }
  .star-item-kanji { font-size: 28px; font-weight: 500; min-width: 44px; text-align: center; color: #1a1a1a; }
  .star-item-info { flex: 1; }
  .star-item-reading { font-size: 13px; color: #444; }
  .star-item-meaning { font-size: 12px; color: #185FA5; }
  .star-item-group { font-size: 11px; color: #aaa; }
  .star-item-del { font-size: 20px; color: #ccc; cursor: pointer; padding: 4px; line-height: 1; }
  .star-item-del:hover { color: #e55; }
  .star-clear-btn {
    width: 100%; padding: 9px; font-size: 13px; font-family: inherit;
    background: #fff; border: 0.5px solid #ddd; border-radius: 8px;
    cursor: pointer; color: #888; margin-top: 4px;
  }
  .star-clear-btn:hover { background: #fff0f0; color: #e55; border-color: #e55; }
  /* ── Footer ── */
  .footer { margin-top: 1.5rem; font-size: 11px; color: #bbb; text-align: center; }
  /* ── Footer ── */
  .footer { margin-top: 1.5rem; font-size: 11px; color: #bbb; text-align: center; }
</style>
<script>
(function(){
  if(localStorage.getItem('kanji_auth') === 'ok') return;
  window.addEventListener('load', function(){
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#f5f4f0;display:flex;align-items:center;justify-content:center;z-index:99999;';
    overlay.innerHTML =
      '<div style="background:#fff;border-radius:16px;padding:40px 32px;width:320px;max-width:88vw;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.10);">' +
        '<div style="font-size:22px;font-weight:700;color:#185FA5;margin-bottom:8px;font-family:-apple-system,sans-serif;">漢字フラッシュカード</div>' +
        '<div style="font-size:14px;color:#999;margin-bottom:24px;font-family:-apple-system,sans-serif;">パスワードを入力してください</div>' +
        '<input id="pwIn" type="password" style="width:100%;padding:14px;border:1.5px solid #ddd;border-radius:10px;font-size:18px;box-sizing:border-box;text-align:center;letter-spacing:6px;margin-bottom:8px;outline:none;">' +
        '<div id="pwErr" style="color:#e55;font-size:13px;height:18px;margin-bottom:6px;font-family:-apple-system,sans-serif;"></div>' +
        '<button id="pwBtn" style="width:100%;padding:14px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif;">Enter</button>' +
      '</div>';
    document.body.appendChild(overlay);
    document.getElementById('pwBtn').addEventListener('click', function(){
      if(document.getElementById('pwIn').value === 'ganbarou2026'){
        localStorage.setItem('kanji_auth','ok');
        overlay.remove();
      } else {
        document.getElementById('pwErr').textContent = 'パスワードが違います';
        document.getElementById('pwIn').value = '';
        document.getElementById('pwIn').focus();
      }
    });
    document.getElementById('pwIn').addEventListener('keydown', function(e){
      if(e.key === 'Enter') document.getElementById('pwBtn').click();
    });
    setTimeout(function(){ document.getElementById('pwIn').focus(); }, 100);
  });
})();
</script>
</head>
<body>

<h1>漢字フラッシュカード</h1>

<div class="tab-row">
  <button id="tab1" class="active" onclick="setLesson(1)">第1回（1〜17）</button>
  <button id="tab2" onclick="setLesson(2)">第2回（18〜36）</button>
  <button id="tab3" onclick="setLesson(3)">第3回（37〜56）</button>
  <button id="tab4" onclick="setLesson(4)">第4回（57〜74）</button>
  <button id="tab5" onclick="setLesson(5)">第5回（75〜92）</button>
  <button id="tab6" onclick="setLesson(6)">第6回（93〜111）</button>
  <button id="tab7" onclick="setLesson(7)">第7回（112〜130）</button>
  <button id="tab8" onclick="setLesson(8)">第8回（131〜150）</button>
  <button id="tab9" onclick="setLesson(9)">全部（1〜150）</button>
  <button id="tabStar" onclick="showStarList()" style="background:#fff8e6;border-color:#f5a623;color:#c07800;">★ 一覧</button>
</div>

<!-- Card view -->
<div id="cardView" style="width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;">
<div class="progress-wrap">
  <span class="progress-text">カード <strong id="cur">1</strong> / <strong id="total">-</strong></span>
</div>
<div class="pbar"><div class="pfill" id="pbar" style="width:0%"></div></div>
<div class="group-label" id="grp"></div>

<div class="card-area">
  <div class="card" id="card" onclick="flipCard()">
    <div class="face front" id="front">
      <span class="star-badge" id="starBadge">★</span>
    </div>
    <div class="face back" id="back"></div>
  </div>
</div>

<div class="flip-hint" id="hint">タップしてめくる</div>

<div class="nav" style="width:100%;max-width:480px;">
  <button onclick="go(-1)">← 前へ</button>
  <button class="sm" onclick="shuffle()">シャッフル</button>
  <button id="starNavBtn" class="sm" onclick="toggleStar(pool[order[current]])">☆</button>
  <button onclick="go(1)">次へ →</button>
</div>
</div>

<!-- Star list view -->
<div class="star-view" id="starView" style="width:100%;max-width:480px;">
  <div id="starListContent"></div>
</div>

<div class="footer"></div>

<script>

================================================================ */

function r(jp, rm, mid, men) { return { jp, rm, mid, men }; }

  c("150 茶","喫茶店",[r("きっさてん","kissaten","kafe / kedai kopi","café / coffee shop")],[e("喫茶店でコーヒーを飲みました。","Kissaten de kōhī o nomimashita.","Saya minum kopi di kafe.")])
];

/* ================================================================
   ★ 第9回以降を追加するには：
   　const L9 = [ ... ];  ← データを追加
   　ALLの行を [...L1,...L2,...L3,...L4,...L5,...L6,...L7,...L8,...L9] に変更
   　タブボタンを1つ追加（HTML側）
   　setLesson() の条件を追加
================================================================ */

const ALL = [...L1, ...L2, ...L3, ...L4, ...L5, ...L6, ...L7, ...L8];

/* ================================================================
   APP STATE & LOGIC
================================================================ */
let pool = [...L1];
let order = pool.map((_,i) => i);
let current = 0;
let flipped = false;

/* ── Star storage ── */
function starKey(card) { return 'star:' + card.kanji; }
function isStarred(card) { return localStorage.getItem(starKey(card)) === '1'; }
function toggleStar(card) {
  if (isStarred(card)) {
    localStorage.removeItem(starKey(card));
    if (starredReviewMode) {
      // レビューモード中は★を外したらその場でカードを削除
      pool = pool.filter(c => c.kanji !== card.kanji);
      if (pool.length === 0) {
        starredReviewMode = false;
        alert('全部覚えました！おめでとう！\nSemua sudah dihafalkan! Selamat!');
        showStarList();
        return;
      }
      order = pool.map((_,i) => i);
      if (current >= pool.length) current = 0;
      render();
      return;
    }
  } else {
    localStorage.setItem(starKey(card), '1');
  }
  updateStarUI();
}
function updateStarUI() {
  const card = pool[order[current]];
  const starred = isStarred(card);
  const badge = document.getElementById('starBadge');
  const navBtn = document.getElementById('starNavBtn');
  if (badge) badge.className = 'star-badge' + (starred ? ' on' : '');
  if (navBtn) {
    navBtn.textContent = starred ? '★' : '☆';
    navBtn.style.background = starred ? '#fff8e6' : '';
    navBtn.style.borderColor = starred ? '#f5a623' : '';
    navBtn.style.color = starred ? '#c07800' : '';
    navBtn.title = starred ? '★を外す' : '間違えやすい（★をつける）';
  }
}

/* ── Views ── */
function showCardView() {
  document.getElementById('cardView').style.display = '';
  document.getElementById('starView').classList.remove('on');
  document.getElementById('tabStar').style.fontWeight = '';
}
function showStarList() {
  document.getElementById('cardView').style.display = 'none';
  document.getElementById('starView').classList.add('on');
  document.getElementById('tabStar').style.fontWeight = '700';
  renderStarList();
}
function renderStarList() {
  const ALL_CARDS = [...L1,...L2,...L3,...L4,...L5,...L6,...L7,...L8];
  const starred = ALL_CARDS.filter(c => isStarred(c));
  const el = document.getElementById('starListContent');
  if (starred.length === 0) {
    el.innerHTML = '<div class="star-list-empty">まだ★をつけた漢字がありません。<br><br>カードをめくって「☆ 間違えやすい」ボタンで追加できます。</div>';
    return;
  }
  let h = '<div style="font-size:13px;color:#888;margin-bottom:12px;text-align:center">★ 間違えやすい漢字 ' + starred.length + '枚</div>';
  h += '<button onclick="reviewStarred()" style="width:100%;padding:12px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:14px;">★ をフラッシュカードで覚える</button>';
  starred.forEach(card => {
    const reading = card.R.map(rv => rv.jp).join(' / ');
    const meaning = card.R.map(rv => rv.mid).join(' / ');
    h += '<div class="star-item">';
    h += '<div class="star-item-kanji">' + card.kanji + '</div>';
    h += '<div class="star-item-info">';
    h += '<div class="star-item-group">' + card.g + '</div>';
    h += '<div class="star-item-reading">' + reading + '</div>';
    h += '<div class="star-item-meaning">' + meaning + '</div>';
    h += '</div>';
    h += '<div class="star-item-del" onclick="removeStar(\'' + card.kanji.replace(/'/g,"\\'") + '\')" title="★を外す">×</div>';
    h += '</div>';
  });
  h += '<button class="star-clear-btn" onclick="clearAllStars()">★ をすべて外す</button>';
  el.innerHTML = h;
}
function removeStar(kanji) {
  localStorage.removeItem('star:' + kanji);
  renderStarList();
}
function clearAllStars() {
  if (!confirm('★をすべて外しますか？')) return;
  Object.keys(localStorage).filter(k => k.startsWith('star:')).forEach(k => localStorage.removeItem(k));
  renderStarList();
}

let starredReviewMode = false;

function reviewStarred() {
  const ALL_CARDS = [...L1,...L2,...L3,...L4,...L5,...L6,...L7,...L8];
  const starred = ALL_CARDS.filter(c => isStarred(c));
  if (starred.length === 0) {
    alert('★をつけた漢字がありません。');
    return;
  }
  starredReviewMode = true;
  pool = starred;
  order = pool.map((_,i) => i);
  current = 0;
  flipped = false;
  ['tab1','tab2','tab3','tab4','tab5','tab6','tab7','tab8','tab9'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById('tabStar').style.fontWeight = '700';
  showCardView();
  render();
}

function setLesson(n) {
  starredReviewMode = false;
  pool = n===1 ? L1 : n===2 ? L2 : n===3 ? L3 : n===4 ? L4 : n===5 ? L5 : n===6 ? L6 : n===7 ? L7 : n===8 ? L8 : ALL;
  order = pool.map((_,i) => i);
  current = 0;
  flipped = false;
  ['tab1','tab2','tab3','tab4','tab5','tab6','tab7','tab8','tab9'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('active', i+1 === n);
  });
  document.getElementById('tabStar').style.fontWeight = '';
  showCardView();
  render();
}

function buildBack(card) {
  let h = '';
  if (card.R.length === 1) {
    const rv = card.R[0];
    h += '<div style="text-align:center;margin-bottom:8px">';
    h += '<div class="r-jp">' + rv.jp + '</div>';
    h += '<div class="r-rm">' + rv.rm + '</div>';
    h += '<div class="arti-label">Arti (Indonesia / Inggris)</div>';
    h += '<div class="r-mid">' + rv.mid + ' <span class="r-men">/ ' + rv.men + '</span></div>';
    h += '</div>';
    h += '<div class="divider"></div>';
    const ex = card.E[0];
    h += '<div class="ex-jp">' + ex.jp + '</div>';
    h += '<div class="ex-rm">' + ex.rm + '</div>';
    h += '<div class="ex-id">' + ex.id + '</div>';
  } else {
    card.R.forEach((rv, i) => {
      if (i > 0) h += '<div class="sub-divider"></div>';
      h += '<div style="text-align:center">';
      h += '<div class="r-jp">' + rv.jp + '</div>';
      h += '<div class="r-rm">' + rv.rm + '</div>';
      h += '<div class="r-mid">' + rv.mid + ' <span class="r-men">/ ' + rv.men + '</span></div>';
      h += '</div>';
    });
    h += '<div class="divider"></div>';
    card.E.forEach((ex, i) => {
      if (i > 0) h += '<div class="sub-divider"></div>';
      if (ex.tag) h += '<div class="ex-tag">例：' + ex.tag + '</div>';
      h += '<div class="ex-jp">' + ex.jp + '</div>';
      h += '<div class="ex-rm">' + ex.rm + '</div>';
      h += '<div class="ex-id">' + ex.id + '</div>';
    });
  }
  return h;
}

function render() {
  const card = pool[order[current]];
  document.getElementById('cur').textContent = current + 1;
  document.getElementById('total').textContent = pool.length;
  document.getElementById('grp').textContent = starredReviewMode ? ('★ 復習モード｜' + card.g) : card.g;
  document.getElementById('pbar').style.width = Math.round((current+1) / pool.length * 100) + '%';
  const starred = isStarred(card);
  // ★バッジは常に残し、漢字だけ差し替える
  const front = document.getElementById('front');
  let badge = front.querySelector('.star-badge');
  if (!badge) {
    badge = document.createElement('span');
    badge.id = 'starBadge';
    front.insertBefore(badge, front.firstChild);
  }
  badge.className = 'star-badge' + (starred ? ' on' : '');
  badge.textContent = '★';
  // 漢字テキスト要素
  let kanjiEl = front.querySelector('.kanji');
  if (!kanjiEl) {
    kanjiEl = document.createElement('div');
    kanjiEl.className = 'kanji';
    front.appendChild(kanjiEl);
  }
  kanjiEl.textContent = card.kanji;
  // ヒント
  let hintEl = front.querySelector('.front-hint');
  if (!hintEl) {
    hintEl = document.createElement('div');
    hintEl.className = 'front-hint';
    front.appendChild(hintEl);
  }
  hintEl.textContent = 'タップしてめくる';
  document.getElementById('back').innerHTML = buildBack(card);
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('hint').textContent = 'タップしてめくる';
  updateStarUI();
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
  document.getElementById('hint').textContent = flipped ? 'タップして戻す' : 'タップしてめくる';
}

function go(dir) {
  current = (current + dir + pool.length) % pool.length;
  render();
}

function shuffle() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  current = 0;
  render();
}

/* ── Swipe gestures (mobile) ── */
(function(){
  let startX = 0, startY = 0, swiping = false, swiped = false;
  const cardEl = document.getElementById('card');
  if (!cardEl) return;
  cardEl.addEventListener('touchstart', function(e){
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = true;
    swiped = false;
  }, { passive: true });
  cardEl.addEventListener('touchend', function(e){
    if (!swiping) return;
    swiping = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    // 横移動が縦移動より大きく、十分な距離移動した場合のみスワイプとみなす
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      swiped = true;
      if (dx < 0) go(-1);  // 左へスワイプ → 前へ
      else        go(1);   // 右へスワイプ → 次へ
    }
  });
  // スワイプ後のclickイベントを抑制（カードがめくれてしまうのを防ぐ）
  cardEl.addEventListener('click', function(e){
    if (swiped) {
      e.stopPropagation();
      e.preventDefault();
      swiped = false;
    }
  }, true);
})();

render();
</script>
</body>
</html>
